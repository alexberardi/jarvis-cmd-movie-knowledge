schema_version: 1
name: entertainment_knowledge
display_name: Entertainment Knowledge
description: >-
  Look up a movie or TV show by name and get a rich inbox card with synopsis,
  cast, director (or creators, for TV), and similar titles. Each actor /
  director / creator / similar title is tappable in the mobile app to drill
  one level deeper (filmography, related titles). Powered by TMDB.
version: 0.1.0
min_jarvis_version: 0.9.0
license: MIT
author:
  github: alexberardi

categories:
  - entertainment
platforms:
  - darwin
  - linux
keywords:
  - movie
  - movies
  - film
  - tv
  - tv show
  - tv series
  - show
  - shows
  - series
  - television
  - imdb
  - tmdb
  - actor
  - actors
  - cast
  - director
  - creator
  - synopsis
  - imdb crawl

components:
  - type: command
    name: entertainment_knowledge
    path: commands/entertainment_knowledge/command.py

packages:
  - name: httpx

secrets:
  - key: TMDB_API_KEY
    scope: integration
    value_type: string
    description: TMDB v3 API key (free; sign up at themoviedb.org/settings/api)
    required: true
    is_sensitive: true
    friendly_name: TMDB API Key

  - key: ENTERTAINMENT_KNOWLEDGE_PUSH_NOTIFICATIONS
    scope: integration
    value_type: bool
    description: >-
      Send a push notification to your phone when a movie or TV crawl card
      lands in the inbox. Defaults to off — the card is always in your inbox;
      the push just decides whether your phone buzzes.
    required: false
    is_sensitive: false
    friendly_name: Push notifications
